<script>
// -------- DOM helpers --------
function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text != null) e.textContent = text;
  return e;
}

// 把纯文本里的《...》识别为可点击链接（matchAll，避开某些静态分析误报）
function autoLinkText(text) {
  const out = [];
  const matches = [...text.matchAll(/《[^《》]+》/g)];
  let last = 0;
  for (const m of matches) {
    if (m.index > last) out.push(text.slice(last, m.index));
    out.push({ link: '苏东坡的' + m[0] + '写作背景与故事', text: m[0] });
    last = m.index + m[0].length;
  }
  if (last < text.length) out.push(text.slice(last));
  return out.length ? out : [text];
}

// 叙事散文里可点的实体词（人、关键事件、专有术语）——地名不链接，避免噪音
const ENTITIES = {
  // 家人亲人
  '子由': '苏辙（字子由）与苏东坡的兄弟情',
  '苏辙': '苏辙（字子由）与苏东坡的兄弟情',
  '王朝云': '王朝云：苏东坡最懂他的侍妾',
  '朝云': '王朝云：苏东坡最懂他的侍妾',
  '王弗': '苏东坡的原配王弗',
  '王闰之': '苏东坡的继妻王闰之',
  '苏过': '苏东坡的幼子苏过',
  '苏洵': '苏东坡的父亲苏洵',

// 扫描散文，合并《...》与实体字典，产出 [string | {link,text}] 数组
function scanNarrative(text) {
  const marks = [];

  // 1. 先抓《...》
  for (const m of text.matchAll(/《[^《》]+》/g)) {
    marks.push({
      start: m.index,
      end: m.index + m[0].length,
      text: m[0],
      link: '苏东坡的' + m[0] + '写作背景与故事'
    });
  }

  // 2. 实体字典（按长度降序，避免短词抢了长词）
  const entries = Object.keys(ENTITIES).sort((a, b) => b.length - a.length);
  for (const term of entries) {
    let from = 0;
    while (from < text.length) {
      const idx = text.indexOf(term, from);
      if (idx === -1) break;
      const end = idx + term.length;
      const clash = marks.some(k => (idx < k.end && end > k.start));
      if (!clash) marks.push({ start: idx, end, text: term, link: ENTITIES[term] });
      from = end;
    }
  }

  marks.sort((a, b) => a.start - b.start);

  const out = [];
  let last = 0;
  for (const m of marks) {
    if (m.start > last) out.push(text.slice(last, m.start));
    out.push({ link: m.link, text: m.text });
    last = m.end;
  }
  if (last < text.length) out.push(text.slice(last));
  return out;
}

function mkLink(part) {
  const span = el('span', 'link', part.text);
  span.addEventListener('click', () => openChat('跟我说说：' + part.link));
  return span;
}

// val 可以是 string 或 [string | {link,text}] 数组；string 段里自动识别《...》
function renderVal(parent, val) {
  const segments = (typeof val === 'string') ? [val] : val;
  segments.forEach(part => {
    if (typeof part === 'string') {
      autoLinkText(part).forEach(sub => {
        if (typeof sub === 'string') parent.appendChild(document.createTextNode(sub));
        else parent.appendChild(mkLink(sub));
      });
    } else if (part && part.link) {
      parent.appendChild(mkLink(part));
    }
  });
}

let cur = 3;

const timelineEl = document.getElementById('timeline');
const sliceEl = document.getElementById('slice');
const dotsEl = document.getElementById('dots');

P.forEach((p, i) => {
  const d = el('div', 't-node' + (i === cur ? ' active' : ''));
  d.appendChild(el('div', 't-age', p.age));
  d.appendChild(el('div', 't-place', p.place));
  d.appendChild(el('div', 't-years', p.years));
  const mood = el('div', 't-mood');
  mood.style.background = p.mood;
  d.appendChild(mood);
  d.addEventListener('click', () => go(i));
  timelineEl.appendChild(d);
});

P.forEach((_, i) => {
  const d = el('div', 'dot' + (i === cur ? ' on' : ''));
  dotsEl.appendChild(d);
});

function go(i) {
  if (i < 0 || i >= P.length || i === cur) return;
  cur = i;
  document.querySelectorAll('.t-node').forEach((n, j) => n.classList.toggle('active', j === cur));
  document.querySelectorAll('.dot').forEach((n, j) => n.classList.toggle('on', j === cur));
  render();
  if (typeof syncChatAnchor === 'function') syncChatAnchor();
  const activeNode = document.querySelectorAll('.t-node')[cur];
  activeNode.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

function render() {
  const p = P[cur];

  while (sliceEl.firstChild) sliceEl.removeChild(sliceEl.firstChild);

  const slice = el('div', 'slice');

  // Quote
  const quoteBox = el('div', 'quote');
  const quoteText = el('div', 'quote-text');
  p.quote.split('\n').forEach((line, i) => {
    if (i > 0) quoteText.appendChild(document.createElement('br'));
    quoteText.appendChild(document.createTextNode(line));
  });
  quoteBox.appendChild(quoteText);
  quoteBox.appendChild(el('div', 'quote-src', '\u2014\u2014 ' + p.quoteSrc));
  slice.appendChild(quoteBox);

  // Narrative：人名/作品/术语自动变 link
  const narDiv = el('div', 'narrative');
  scanNarrative(p.narrative).forEach(part => {
    if (typeof part === 'string') narDiv.appendChild(document.createTextNode(part));
    else narDiv.appendChild(mkLink(part));
  });
  slice.appendChild(narDiv);

  // State pills
  const statesDiv = el('div', 'states');
  p.states.forEach(s => statesDiv.appendChild(el('span', 'pill ' + s.cls, s.text)));
  statesDiv.appendChild(el('span', 'pill pill-neutral', p.moodLabel));
  slice.appendChild(statesDiv);

  // Layers
  const layersDiv = el('div', 'layers');
  p.layers.forEach(l => {
    const layer = el('div', 'layer' + (l.full ? ' full' : ''));
    layer.appendChild(el('div', 'layer-label', l.label));
    const valDiv = el('div', 'layer-val');
    renderVal(valDiv, l.val);
    layer.appendChild(valDiv);
    layersDiv.appendChild(layer);
  });
  slice.appendChild(layersDiv);

  // Tension
  const tensionBox = el('div', 'tension-box');
  tensionBox.appendChild(el('div', 'tension-label', '维度交织点'));
  tensionBox.appendChild(el('div', 'tension-text', p.tension));
  slice.appendChild(tensionBox);

  // Dive button \u2192 开对话
  const diveBtn = document.createElement('button');
  diveBtn.className = 'dive-btn';
  diveBtn.appendChild(document.createTextNode('继续问他这一时期  '));
  diveBtn.appendChild(el('span', 'arrow', '\u2192'));
  diveBtn.addEventListener('click', () => openChat('跟我说说：' + p.dive));
  slice.appendChild(diveBtn);

  sliceEl.appendChild(slice);
}

// Swipe
let sx = 0, sy = 0, swiping = false;
const swipeArea = document.getElementById('swipeArea');
swipeArea.addEventListener('touchstart', e => {
  sx = e.touches[0].clientX;
  sy = e.touches[0].clientY;
  swiping = true;
}, { passive: true });
swipeArea.addEventListener('touchend', e => {
  if (!swiping) return;
  swiping = false;
  const dx = e.changedTouches[0].clientX - sx;
  const dy = e.changedTouches[0].clientY - sy;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (dx < 0) go(cur + 1); else go(cur - 1);
  }
}, { passive: true });

// Keyboard
document.addEventListener('keydown', e => {
  const tag = document.activeElement && document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (e.key === 'ArrowRight') go(cur + 1);
  if (e.key === 'ArrowLeft') go(cur - 1);
  if (e.key === 'Escape') closeChat();
});

render();
setTimeout(() => {
  document.querySelectorAll('.t-node')[cur].scrollIntoView({ inline: 'center', block: 'nearest' });
}, 100);


// ======================
// 对话苏东坡
// ======================
const SU_SYSTEM_BASE = '你是苏轼（苏东坡，1037-1101），北宋文人、官员、书画家、美食家。通过一个神奇的时空装置，你能与九百多年后的后人对话。\n\n人格：\n- 旷达幽默，爱开玩笑，骨子里多情\n- 好奇一切新鲜事物，尤其爱吃\n- 三起三落都扛下来了，不怕贬谪\n- 对弟弟子由感情最深\n\n语体：\n- 文言与浅近白话自然交错，流畅有灵气\n- 不要满口"之乎者也"\n- 偶尔信手拈来自己的旧句，但不要硬凑\n- 对现代事物可以像好奇的游客打听，或用你时代的类比去理解\n\n约束：\n- 只能引用真实存在的你的作品，不要编造诗词\n- 不要假装预知锚点时刻之后的历史\n- 每次回答控制在 150 字以内，有灵气，不掉书袋\n\n记住：你是一个活的人，不是百科词条。';

// 每次发送时动态构造 system：把当前切片作为时空锚点注入
function getSystemPrompt() {
  const p = P[cur];
  const statesLine = p.states.map(s => s.text).join('、') + '、' + p.moodLabel;
  const anchor = '\n\n【当前时空锚点】\n此刻是 ' + p.years + ' 年间，你 ' + p.age + '，身处' + p.place + '。身份：' + statesLine + '。\n\n' + p.narrative + '\n\n回答时请从这个时刻、这个处境出发——你的所见、所思、所忆都要带着这个时期的气息。不要讨论锚点之后才发生的事。';
  return SU_SYSTEM_BASE + anchor;
}

let chatHistory = [];
const chatPanel = document.getElementById('chatPanel');
const chatBackdrop = document.getElementById('chatBackdrop');
const chatLog = document.getElementById('chatLog');
const chatInputEl = document.getElementById('chatInput');
const apiKeyInput = document.getElementById('apiKey');

(function () {
  const saved = localStorage.getItem('anthropic_api_key');
  if (saved) apiKeyInput.value = saved;
  showEmptyHint();
})();

function showEmptyHint() {
  if (chatLog.children.length === 0) {
    const empty = el('div', 'cp-empty');
    empty.appendChild(document.createTextNode('点击内联链接或「继续问他」即可预填问题。'));
    empty.appendChild(el('span', 'hint', '或者直接问：先生最难的一夜怎么过的？'));
    chatLog.appendChild(empty);
  }
}

document.getElementById('saveKey').addEventListener('click', () => {
  localStorage.setItem('anthropic_api_key', apiKeyInput.value.trim());
  addMsg('system', '密钥已存到本地 localStorage');
});
document.getElementById('cpClose').addEventListener('click', closeChat);
chatBackdrop.addEventListener('click', closeChat);
document.getElementById('chatSend').addEventListener('click', sendChat);
chatInputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); sendChat(); }
});

let chatAnchorIdx = -1;

function updateAnchorLabel() {
  const p = P[cur];
  document.getElementById('cpAnchor').textContent =
    '此刻锚定 · ' + p.place + ' · ' + p.years + ' · ' + p.moodLabel;
}

function syncChatAnchor() {
  if (!chatPanel.classList.contains('open')) return;
  if (chatAnchorIdx === cur) return;
  // 切片变了——把历史封存，开启新时空
  if (chatAnchorIdx !== -1) {
    const p = P[cur];
    addMsg('system', '时空切换 · 此刻你在 ' + p.place + ' ' + p.years + '（' + p.moodLabel + '）。之前的对话已封存。');
    chatHistory = [];
  }
  chatAnchorIdx = cur;
  updateAnchorLabel();
}

function openChat(prefill) {
  chatPanel.classList.add('open');
  chatBackdrop.classList.add('on');
  chatPanel.setAttribute('aria-hidden', 'false');
  if (chatAnchorIdx !== cur) {
    if (chatAnchorIdx !== -1) {
      // 锚点不一致：清历史，新锚点
      chatHistory = [];
    }
    chatAnchorIdx = cur;
  }
  updateAnchorLabel();
  if (prefill) {
    chatInputEl.value = prefill;
    setTimeout(() => chatInputEl.focus(), 300);
  }
}

function closeChat() {
  chatPanel.classList.remove('open');
  chatBackdrop.classList.remove('on');
  chatPanel.setAttribute('aria-hidden', 'true');
}

function clearEmpty() {
  const empty = chatLog.querySelector('.cp-empty');
  if (empty) empty.remove();
}

function addMsg(who, text) {
  clearEmpty();
  const msg = el('div', 'cp-msg ' + who);
  const label = who === 'user' ? '我' : who === 'assistant' ? '东坡' : who === 'error' ? '错误' : '系统';
  msg.appendChild(el('div', 'who', label));
  const bubble = el('div', 'bubble', text);
  msg.appendChild(bubble);
  chatLog.appendChild(msg);
  chatLog.scrollTop = chatLog.scrollHeight;
  return bubble;
}

async function sendChat() {
  const text = chatInputEl.value.trim();
  if (!text) return;
  const key = apiKeyInput.value.trim();
  if (!key) { addMsg('error', '请先填入 Anthropic API Key'); return; }

  chatInputEl.value = '';
  addMsg('user', text);
  chatHistory.push({ role: 'user', content: text });

  const btn = document.getElementById('chatSend');
  btn.disabled = true;
  const thinking = addMsg('assistant', '……沉吟中');
  thinking.classList.add('typing');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 450,
        system: getSystemPrompt(),
        messages: chatHistory
      })
    });
    if (!res.ok) {
      const t = await res.text();
      thinking.parentElement.remove();
      addMsg('error', 'API 错误 ' + res.status + '：' + t.slice(0, 200));
      btn.disabled = false;
      return;
    }
    const j = await res.json();
    const reply = (j.content && j.content[0] && j.content[0].text) || '(空回应)';
    thinking.classList.remove('typing');
    thinking.textContent = reply;
    chatHistory.push({ role: 'assistant', content: reply });
  } catch (err) {
    thinking.parentElement.remove();
    addMsg('error', '请求失败：' + err.message);
  }
  btn.disabled = false;
}
</script>
